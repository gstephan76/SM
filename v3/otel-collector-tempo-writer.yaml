apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-tempo-writer
rules:
  - apiGroups: ["tempo.grafana.com"]
    resources: ["north"] # This must match your X-Scope-OrgID header
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-tempo-writer-binding
subjects:
  - kind: ServiceAccount
    name: otel
    namespace: istio-system
roleRef:
  kind: ClusterRole
  name: otel-collector-tempo-writer
  apiGroup: rbac.authorization.k8s.io
